name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "--features metal"
          - "--features vulkan"
          - "--features verify"
          - "--features verify,vulkan"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run tests ${{ matrix.features }}
        run: cargo test ${{ matrix.features }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build docs (all features)
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  kani:
    name: Kani Verification
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'run-kani')
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v31
      - name: Run Kani harnesses
        run: |
          cargo kani --harness buffer_alignment_boundary
          cargo kani --harness workgroup_divisibility
          cargo kani --harness buffer_size_no_overflow

  miri:
    name: Miri (safety check)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'run-miri')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on buffer lifecycle tests
        run: cargo miri test --features vulkan buffer_lifecycle

  kani:
    name: Kani Verification
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'run-kani')
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v31
      - name: Run Kani harnesses
        run: |
          cargo kani --harness buffer_alignment_boundary
          cargo kani --harness workgroup_divisibility
          cargo kani --harness buffer_size_no_overflow
